version: '3.8'

services:
  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      - API_BASE_URL=http://localhost:7860
      - MODEL_NAME=gpt-3.5-turbo
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./support_tickets.db
    volumes:
      - ./:/app
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app_data:
